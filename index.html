
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- PWA & Mobile Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1120" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FAHUB" />
    
    <title>FAHUB MANAGER | Oficial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary': '#0f172a', // Solid Dark Blue
              'secondary': '#1e293b', // Lighter Solid Blue
              'tertiary': '#334155',
              'accent': '#475569',
              'highlight': '#059669', // Darker Green (Less Neon)
              'highlight-hover': '#047857',
              'success': '#10b981',
              'warning': '#d97706',
              'danger': '#dc2626',
              'text-primary': '#f1f5f9',
              'text-secondary': '#cbd5e1',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'glow': '0 0 20px rgba(5, 150, 105, 0.3)', 
              'sm': '0 1px 2px 0 rgb(0 0 0 / 0.05)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        user-select: none;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none; /* Previne bounce no mobile */
      }
      /* Simplified Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
      
      /* GPU ACCELERATED GLASSMORPHISM */
      /* O segredo da performance: translateZ(0) joga o elemento para a GPU */
      .glass-panel { 
        background-color: rgba(30, 41, 59, 0.7); 
        border: 1px solid rgba(255, 255, 255, 0.08); 
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transform: translateZ(0);
        will-change: transform, opacity;
        backface-visibility: hidden;
      }
      
      /* Smooth Animations enabled but hardware accelerated */
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
        will-change: opacity;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
</head>
  <body class="bg-primary text-text-primary h-screen overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
