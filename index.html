<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1120" />
    <title>FAHUB MANAGER | Oficial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary': '#0f172a', // Solid Dark Blue
              'secondary': '#1e293b', // Lighter Solid Blue
              'tertiary': '#334155',
              'accent': '#475569',
              'highlight': '#059669', // Darker Green (Less Neon)
              'highlight-hover': '#047857',
              'success': '#10b981',
              'warning': '#d97706',
              'danger': '#dc2626',
              'text-primary': '#f1f5f9',
              'text-secondary': '#cbd5e1',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            // Shadows removed for performance
            boxShadow: {
              'glow': 'none', 
              'sm': '0 1px 2px 0 rgb(0 0 0 / 0.05)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }
      /* Simplified Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
      
      /* Performance Optimized Panel: Solid Color, No Blur */
      .glass-panel { 
        background-color: #1e293b; 
        border: 1px solid #334155; 
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      
      /* Disable animations globally for performance */
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    </style>
</head>
  <body class="bg-primary text-text-primary h-screen overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
